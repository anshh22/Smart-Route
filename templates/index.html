<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Route Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-effect"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>SmartRoute <span class="accent">AI</span></h1>
            </div>
            <p class="subtitle">Advanced Pathfinding & Network Analysis</p>
        </header>

        <main>
            <div class="panel control-panel">
                <h2>Route Configuration</h2>
                
                <div class="form-group">
                    <label for="startNode">Origin</label>
                    <select id="startNode" class="custom-select">
                        <option value="" disabled selected>Select start location</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="endNode">Destination</label>
                    <select id="endNode" class="custom-select">
                        <option value="" disabled selected>Select destination</option>
                    </select>
                </div>

                <button id="calculateBtn" class="primary-btn">
                    <span class="btn-text">Calculate Optimal Route</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="panel results-panel">
                <h2>Analysis Results</h2>
                
                <div id="loadingIndicator" class="hidden">
                    <div class="spinner"></div>
                    <p>Analyzing network topology...</p>
                </div>

                <div id="resultsContent" class="hidden">
                    <div class="metric-card">
                        <span class="metric-label">Total Distance</span>
                        <span class="metric-value" id="totalDistance">0</span>
                        <span class="metric-unit">km</span>
                    </div>

                    <div class="path-visualization">
                        <h3>Optimal Path</h3>
                        <div class="timeline" id="pathTimeline">
                            <!-- Timeline items will be injected here -->
                        </div>
                    </div>
                </div>

                <div id="emptyState">
                    <div class="empty-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 10C21 17 12 23 12 23C12 23 3 17 3 10C3 7.61305 3.94821 5.32387 5.63604 3.63604C7.32387 1.94821 9.61305 1 12 1C14.3869 1 16.6761 1.94821 18.364 3.63604C20.0518 5.32387 21 7.61305 21 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <p>Select an origin and destination to generate route insights.</p>
                </div>
            </div>
        </main>
        
        <div class="panel map-panel">
             <h2>Interactive Map</h2>
             <div id="map" style="height: 500px; width: 100%; border-radius: 12px; z-index: 1;"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
